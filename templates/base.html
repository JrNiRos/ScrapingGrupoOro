<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>{% block title %}Grupo Oro{% endblock %}</title>
  {% load static %}
  <link rel="icon" type="image/png" href="{% static 'favicon/img/GrupoOroIcono_round.png' %}">
  <link rel="apple-touch-icon" href="{% static 'favicon/img/GrupoOroIcono_round.png' %}">
  <link rel="shortcut icon" href="{% static 'favicon/favicon.ico' %}">
  <link rel="icon" href="{% static 'favicon/favicon.ico' %}" sizes="any">
  <link rel="icon" type="image/png" href="{% static 'favicon/icon-512.png' %}" sizes="512x512">
  <link rel="icon" type="image/png" href="{% static 'favicon/icon-192.png' %}" sizes="192x192">
  <link rel="icon" type="image/png" href="{% static 'favicon/icon-32.png' %}" sizes="32x32">
  <link rel="icon" type="image/png" href="{% static 'favicon/icon-16.png' %}" sizes="16x16">
  <link rel="manifest" href="{% static 'favicon/site.webmanifest' %}">
  <meta name="theme-color" content="#d4af37">
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root { --bg:#0f0f0f; --text:#e5e5e5; --gold:#d4af37; --border:#3a3a3a; }
    body { font-family: Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial; }
  </style>
  {% block head %}{% endblock %}
  {% csrf_token %}
</head>
<body class="min-h-screen bg-[var(--bg)] text-[var(--text)] flex flex-col">
  <header class="border-b border-[var(--border)] bg-[color:rgba(15,15,15,0.7)] backdrop-blur supports-[backdrop-filter]:bg-[color:rgba(15,15,15,0.5)]">
    <div class="max-w-5xl mx-auto px-6">
      <div class="h-20 flex items-center justify-between">
        <a href="/" class="inline-flex items-center gap-3 group">
          <img src="{% static 'favicon/img/GrupoOroIcono_round.png' %}" alt="Grupo Oro" class="h-9 w-9 rounded-md shadow-sm" />
          <span class="text-3xl font-semibold tracking-wide text-[var(--text)]">Grupo <span class="text-[var(--gold)]">Oro</span></span>
        </a>
        <div class="flex items-center gap-3">
          {% if request.user.is_authenticated %}
            <span class="text-sm text-neutral-300 hidden sm:inline">{{ request.user.email }}</span>
            <a href="/logout/" class="rounded-lg border border-white/15 px-3 py-1.5 text-sm hover:bg-white/10">Salir</a>
          {% else %}
            <a href="/login/" class="rounded-lg bg-[var(--gold)] text-black font-semibold px-3 py-1.5 text-sm">Entrar</a>
          {% endif %}
        </div>
      </div>
    </div>
  </header>

  <main class="flex-1">
    <div class="max-w-5xl mx-auto px-6 py-12 sm:py-16">
      {% block content %}{% endblock %}
    </div>
  </main>

  <footer class="border-t border-[var(--border)] bg-[var(--bg)]">
    <div class="max-w-5xl mx-auto px-6 py-8 text-sm text-neutral-400">
      © 2025 Grupo Oro – Todos los derechos reservados
    </div>
  </footer>
</body>
</html>
