<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>{% block title %}Grupo Oro{% endblock %}</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root { --bg:#0f0f0f; --text:#e5e5e5; --gold:#d4af37; --border:#3a3a3a; }
    body { font-family: Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial; }
  </style>
  {% block head %}{% endblock %}
  {% csrf_token %}
</head>
<body class="min-h-screen bg-[var(--bg)] text-[var(--text)] flex flex-col">
  <header class="border-b border-[var(--border)] bg-[color:rgba(15,15,15,0.7)] backdrop-blur supports-[backdrop-filter]:bg-[color:rgba(15,15,15,0.5)]">
    <div class="max-w-5xl mx-auto px-6">
      <div class="h-20 flex items-center justify-between">
        <a href="/" class="inline-flex items-center gap-3 group">
          <div class="w-2 h-7 bg-[var(--gold)] rounded-sm group-hover:scale-y-110 transition" aria-hidden="true"></div>
          <span class="text-3xl font-semibold tracking-wide text-[var(--text)]">Grupo <span class="text-[var(--gold)]">Oro</span></span>
        </a>
      </div>
    </div>
  </header>

  <main class="flex-1">
    <div class="max-w-5xl mx-auto px-6 py-12 sm:py-16">
      {% block content %}{% endblock %}
    </div>
  </main>

  <footer class="border-t border-[var(--border)] bg-[var(--bg)]">
    <div class="max-w-5xl mx-auto px-6 py-8 text-sm text-neutral-400">
      © 2025 Grupo Oro – Todos los derechos reservados
    </div>
  </footer>
</body>
</html>
