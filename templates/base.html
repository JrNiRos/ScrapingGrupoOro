<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>{% block title %}Grupo Oro{% endblock %}</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root { --brand:#0a0a0b; --gold:#d4af37; --muted:#a3a3a3; }
    body { font-family: Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial; }
  </style>
  {% block head %}{% endblock %}
  {% csrf_token %}
</head>
<body class="min-h-screen bg-black text-neutral-200 flex flex-col">
  <header class="border-b border-white/10 bg-black/60 backdrop-blur supports-[backdrop-filter]:bg-black/40">
    <div class="max-w-7xl mx-auto px-5 sm:px-8 lg:px-10">
      <div class="h-18 sm:h-20 flex items-center justify-between">
        <a href="/" class="inline-flex items-center gap-3 group">
          <div class="w-2 h-7 bg-[var(--gold)] rounded-sm group-hover:scale-y-110 transition" aria-hidden="true"></div>
          <span class="text-2xl sm:text-3xl font-semibold tracking-tight text-white">Grupo <span class="text-[var(--gold)]">Oro</span></span>
        </a>
      </div>
    </div>
  </header>

  <main class="flex-1">
    <div class="max-w-7xl mx-auto px-5 sm:px-8 lg:px-10 py-10 sm:py-14">
      {% block content %}{% endblock %}
    </div>
  </main>

  <footer class="border-t border-white/10 bg-black">
    <div class="max-w-7xl mx-auto px-5 sm:px-8 lg:px-10 py-8 text-sm text-neutral-400">
      © 2025 Grupo Oro – Todos los derechos reservados
    </div>
  </footer>
</body>
</html>
