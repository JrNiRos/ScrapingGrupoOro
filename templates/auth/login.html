{% extends 'base.html' %}
{% block title %}Iniciar sesión – Grupo Oro{% endblock %}
{% block content %}
<div class="auth-container">
  <div class="auth-card">
    <div class="auth-header">
      <h1>Iniciar sesión</h1>
      <p>Accede a tu cuenta de Grupo Oro</p>
    </div>
    
    <form method="post" class="auth-form">
      {% csrf_token %}
      {{ form.non_field_errors }}
      
      <div class="form-group">
        <label for="username" class="form-label">Email</label>
        <input type="email" name="username" id="username" required class="input-field" placeholder="tu@email.com" />
      </div>
      
      <div class="form-group">
        <label for="password" class="form-label">Contraseña</label>
        <input type="password" name="password" id="password" required class="input-field" placeholder="Tu contraseña" />
      </div>
      
      <button type="submit" class="btn-primary" style="width: 100%;">Entrar</button>
    </form>
    
    <div class="auth-links">
      <p>¿No tienes cuenta? <a href="/register/">Regístrate</a></p>
    </div>
  </div>
</div>
{% endblock %}
