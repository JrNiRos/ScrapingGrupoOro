{% extends 'base.html' %}
{% block title %}Iniciar sesión – Grupo Oro{% endblock %}
{% block content %}
<div class="max-w-md mx-auto bg-white/5 ring-1 ring-white/10 rounded-2xl p-6">
  <h1 class="text-2xl font-semibold mb-4">Iniciar sesión</h1>
  <form method="post">
    {% csrf_token %}
    {{ form.non_field_errors }}
    <div class="space-y-3">
      <div>
        <label class="text-sm">Email</label>
        <input type="email" name="username" required class="w-full rounded-xl bg-white/5 border border-white/10 text-white px-3 py-2" />
      </div>
      <div>
        <label class="text-sm">Contraseña</label>
        <input type="password" name="password" required class="w-full rounded-xl bg-white/5 border border-white/10 text-white px-3 py-2" />
      </div>
      <button class="w-full rounded-xl bg-[var(--gold)] text-black font-semibold px-4 py-2">Entrar</button>
    </div>
  </form>
  <p class="text-sm text-neutral-400 mt-4">¿No tienes cuenta? <a class="underline" href="/register/">Regístrate</a></p>
{% endblock %}
